<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0;
           background: #f5f5f5; color: #333; }
    p { font-size: 18px; }
  </style>
</head>
<body>
  <p>Redirecting you to the right place...</p>
  <script>
    (function() {
      var ua = navigator.userAgent;
      if (/android/i.test(ua)) {
        window.location.replace("https://play.google.com/store/search?q=drop%20hub&c=apps&hl=en");
      } else if (/iPhone|iPad|iPod/i.test(ua)) {
        window.location.replace("https://apps.apple.com/us/app/drop-hub-explore-and-droplet/id6755708377");
      } else {
        window.location.replace("https://dr0p.club/");
      }
    })();
  </script>
</body>
</html>
